name: OpenSSF Scorecard

# Machine-verifies most of this repo's supply-chain posture (pinned
# dependencies, token permissions, security policy, SAST) and publishes a
# public score. Badge for the README:
# https://api.scorecard.dev/projects/github.com/OWNER/REPO/badge

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 5 * * 1'
  # Manual re-run for transient scorecard.dev publish failures.
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # publish_results uses OIDC to sign results
      security-events: write # upload SARIF results

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
