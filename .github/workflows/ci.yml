name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        # PRs run on ubuntu only for fast feedback; pushes to main (and manual
        # dispatches) also run the Windows leg to catch path-separator,
        # line-ending, and dev-cert issues that bite Windows users.
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      # All actions are pinned to full commit SHAs with the version in a trailing
      # comment: tags are mutable and have been retargeted in real supply-chain
      # attacks (tj-actions/changed-files, March 2025). Dependabot understands
      # this format and keeps the SHAs fresh.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Agent skills mirror drift check
        # .agents/skills/ is a real-copy mirror of .claude/skills/ (the
        # cross-runtime discovery path; symlinks would break the Windows leg).
        # Edit the .claude copy, then run `npm run skills:sync`.
        id: skills_drift
        shell: bash
        run: diff -r .claude/skills .agents/skills

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # .nvmrc is the single source of truth for the CI Node version.
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        id: npm_ci
        run: npm ci

      - name: Rebuild trusted native packages
        id: rebuild_trusted
        # .npmrc sets ignore-scripts=true (install scripts are the dominant npm
        # supply-chain attack vector — e.g. the Shai-Hulud worm, Sep 2025, with
        # 1700+ compromised package versions). Packages that legitimately need
        # their install scripts are rebuilt explicitly by this allow-list script;
        # see "rebuild-trusted" in vueapp1.client/package.json.
        run: npm --prefix vueapp1.client run rebuild-trusted

      - name: Restore .NET packages
        id: nuget_restore
        # --locked-mode fails the build if packages.lock.json is out of sync with the
        # project files instead of silently resolving different package versions.
        run: dotnet restore --locked-mode

      - name: Lint
        id: lint
        run: npm run lint:check

      - name: Format
        id: format
        run: npm run format:check

      - name: Type check
        id: typecheck
        run: npm run type-check

      - name: Frontend tests
        id: fe_tests
        run: npm --prefix vueapp1.client run test:ci

      - name: Build
        id: build
        run: npm run build

      - name: OpenAPI contract check
        id: openapi
        run: npm run openapi:check

      - name: Backend unit tests
        id: be_unit
        run: dotnet test VueApp1.Server.UnitTests/VueApp1.Server.UnitTests.csproj --no-build

      - name: Backend integration tests with coverage gate
        id: be_integration
        run: >
          dotnet test VueApp1.Server.IntegrationTests/VueApp1.Server.IntegrationTests.csproj --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=opencover
          "/p:Exclude=[*.Tests]*"
          /p:Threshold=20
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Upload test results
        # always(): failed runs are exactly the ones whose results you need.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: vueapp1.client/test-results/
          # Loudly catch mis-wired output paths instead of silently uploading nothing.
          if-no-files-found: error
          retention-days: 7

      - name: Failure digest
        # Names the failed step + the local repro command in the job summary.
        # The job summary has NO gh/REST read endpoint, so this is the
        # human-facing half; agents retrieve failures via the contract in
        # docs/GITHUB.md (gh run view --log-failed + the test-results artifact).
        if: failure()
        shell: bash
        env:
          STEPS_JSON: ${{ toJSON(steps) }}
        run: |
          digest=$(echo "$STEPS_JSON" | jq -r '
            { skills_drift: "npm run skills:sync  (then commit the mirror)",
              npm_ci: "npm run setup", rebuild_trusted: "npm run setup", nuget_restore: "npm run setup",
              lint: "npm run lint:check", format: "npm run format:check", typecheck: "npm run type-check",
              fe_tests: "npm run test:frontend", build: "npm run build", openapi: "npm run openapi:check",
              be_unit: "npm run test:backend",
              be_integration: "npm run test:backend -- --coverage  (threshold gate is CI-only; see docs/GITHUB.md)" } as $repro
            | to_entries[] | select(.value.outcome == "failure")
            | "failed-step: \(.key)\nlocal-repro: \($repro[.key] // "npm run check")"')
          # Steps without an id (checkout, setup-dotnet, setup-node, upload) never
          # appear in the steps context, so a failure there yields an empty digest.
          # NOTE: no apostrophes in the fallback text — inside "${var:-...}" bash
          # treats a single quote as an opening quote and dies with a parse error.
          digest="${digest:-failed-step: (step without an id: checkout/setup/upload — see full-log below)}"
          {
            echo "## CI failure digest (${{ matrix.os }})"
            echo '```'
            echo "$digest"
            echo "full-log: gh run view ${{ github.run_id }} --log-failed"
            echo "artifact: test-results-${{ matrix.os }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$digest"

  # Runs the SHIPPED artifact: docker build + run + HTTP probes against the
  # live container. WebApplicationFactory structurally cannot cover this —
  # the Docker image copies the SPA dist into wwwroot AFTER publish, a layout
  # the in-process test host never sees (PR #33: /assets/*.js and sw.js 404'd
  # as ProblemDetails while / looked fine). Main pushes + manual dispatch
  # only: an uncached multi-stage build costs minutes, so it stays out of the
  # PR fast path and out of the serial `npm run check` gate.
  container-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build container image
        run: docker build -t vueapp1-smoke .

      - name: Start container
        run: docker run -d --name vueapp1-smoke -p 8080:8080 vueapp1-smoke

      - name: Wait for liveness
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health/live > /dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::container never became live"
          exit 1

      - name: Smoke-test the running container
        # The #33 lesson, encoded: fetch a REAL hashed asset parsed from
        # index.html (MapStaticAssets serves only manifest-listed files, so
        # post-publish wwwroot content can 404 while / works) plus sw.js —
        # never just /.
        run: |
          set -euo pipefail
          base=http://localhost:8080

          # SPA shell
          curl -fsS "$base/" | grep -q '<div id="app">'

          # A real fingerprinted bundle, parsed from the served shell
          asset=$(curl -fsS "$base/" | grep -oE '/assets/[A-Za-z0-9._-]+\.js' | head -n 1)
          test -n "$asset"
          echo "probing real asset: $asset"
          curl -fsS "$base$asset" > /dev/null

          # PWA artifacts
          curl -fsS "$base/sw.js" > /dev/null
          curl -fsS "$base/manifest.webmanifest" > /dev/null

          # Unmatched /api must be an RFC 9457 ProblemDetails 404,
          # not the SPA shell with a 200
          code=$(curl -s -D /tmp/api404.headers -o /tmp/api404.json \
            -w '%{http_code}' "$base/api/does-not-exist")
          test "$code" = "404"
          grep -qi '^content-type: application/problem+json' /tmp/api404.headers
          jq -e '.status == 404 and .title == "Not Found"' /tmp/api404.json

          # Probe pair + single-path alias
          test "$(curl -fsS "$base/health/live")" = "Healthy"
          test "$(curl -fsS "$base/health/ready")" = "Healthy"
          test "$(curl -fsS "$base/health")" = "Healthy"

      - name: Container logs on failure
        if: failure()
        run: docker logs vueapp1-smoke
