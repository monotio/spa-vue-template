name: Template Cleanup

# Runs once in repositories created via "Use this template": renames VueApp1
# to the new repo's name, rewrites the template's GitHub slug, then deletes
# the rename machinery (including this workflow) and pushes the result.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    # Never run in the template repository itself.
    if: github.event.repository.name != 'spa-vue-template'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rename project to repository name
        run: |
          # Only run once: rename.mjs is deleted after the first pass.
          if [ ! -f scripts/rename.mjs ]; then
            echo "Already cleaned up — nothing to do."
            exit 0
          fi
          node scripts/rename.mjs "${{ github.event.repository.name }}" --apply --repo "${{ github.repository }}"
          rm -f scripts/rename.mjs
          rm -f .github/workflows/template-cleanup.yml

      - name: Commit and push
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: template cleanup — rename VueApp1 to ${{ github.event.repository.name }}"
          git push
