name: CodeQL

# Static analysis for both halves of the stack. This is the "advanced setup"
# workflow file (rather than the repo-settings default setup) so that the
# configuration propagates to every repository generated from this template.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '24 5 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # upload SARIF results

    strategy:
      fail-fast: false
      matrix:
        include:
          # build-mode none: since CodeQL 2.18, C# analysis needs no build step.
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: '/language:${{ matrix.language }}'
