name: PR Title

# Enforces Conventional Commits on PR titles — squash merges use the title as
# the commit subject, so this keeps the main history machine-readable.

on:
  pull_request_target:
    types: [opened, edited, synchronize]

# pull_request_target is safe in this workflow: it never checks out or
# executes code from the PR — it only reads the title via the API.
permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
