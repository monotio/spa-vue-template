# Preinstalls the repo toolchain for GitHub's Copilot coding agent: the agent
# boots an ephemeral VM and runs this job before it starts work. Without it
# the agent burns its first turns on bootstrap — or worse, proceeds with a
# silently degraded environment (a failed setup no longer blocks the agent),
# missing exactly the steps it cannot guess: this repo disables npm install
# scripts (.npmrc ignore-scripts=true), so trusted native packages must be
# rebuilt explicitly, and NuGet restore must run in locked mode.
# Docs: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
# Firewall model and self-validation notes: docs/GITHUB.md.
name: Copilot Setup Steps

on:
  workflow_dispatch:
  # Self-validation: any change to this file runs it as a normal workflow,
  # so a broken setup is caught in the PR, not on the next Copilot task.
  push:
    branches: [main]
    paths: ['.github/workflows/copilot-setup-steps.yml']
  pull_request:
    paths: ['.github/workflows/copilot-setup-steps.yml']

permissions:
  contents: read

jobs:
  # The job name MUST be exactly `copilot-setup-steps` — GitHub looks the job
  # up by name and silently ignores the file otherwise.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Mirrors `npm run setup` and the ci.yml setup steps; keep all three in
    # sync when the toolchain bootstrap changes. SHA pins follow the repo
    # convention (see ci.yml) and ride the same Dependabot group.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Rebuild trusted native packages
        # The allow-list rebuild for packages whose install scripts are
        # legitimately needed; see "rebuild-trusted" in vueapp1.client/package.json.
        run: npm --prefix vueapp1.client run rebuild-trusted

      - name: Restore .NET packages
        run: dotnet restore --locked-mode

      - name: Restore .NET tools
        run: dotnet tool restore
