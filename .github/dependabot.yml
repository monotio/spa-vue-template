version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
    # Cooldown is the bot-PR analogue of a minimum release age: freshly
    # published versions wait before being proposed, so registry compromises
    # are usually yanked before a bump PR ever opens. Security updates bypass it.
    cooldown:
      default-days: 5
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]
        # Majors arrive as individual, reviewable PRs (an upload-artifact 4->7
        # jump should never hide inside a grouped bump).
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/vueapp1.client"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:10"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
      semver-major-days: 14
    labels: ["dependencies"]
    groups:
      frontend:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:20"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
      semver-major-days: 14
    labels: ["dependencies"]
    ignore:
      # ASP.NET Core 10's OpenAPI support compiles against Microsoft.OpenApi 2.x;
      # 3.x is a breaking trap (see Directory.Packages.props).
      - dependency-name: "Microsoft.OpenApi"
        update-types: ["version-update:semver-major"]
    groups:
      dotnet:
        patterns: ["*"]
        update-types: ["minor", "patch"]
